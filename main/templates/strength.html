<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Password Strength Checker</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #fafaf8;
      --surface: #ffffff;
      --border: #e5e7eb;
      --text: #111827;
      --muted: #9ca3af;
      --accent: #111827;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 2.5rem;
      width: 100%;
      max-width: 520px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.06);
    }
    .badge {
      display: inline-block;
      background: #f3f4f6;
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: 'DM Mono', monospace;
      font-size: 0.68rem;
      padding: 0.3rem 0.8rem;
      border-radius: 20px;
      margin-bottom: 1.2rem;
    }
    h1 { font-size: 2rem; font-weight: 800; margin-bottom: 0.4rem; }
    h1 span { text-decoration: underline; text-decoration-color: #6366f1; text-underline-offset: 4px; }
    .subtitle { color: var(--muted); font-size: 0.88rem; margin-bottom: 2rem; font-weight: 400; }

    .input-wrap {
      position: relative;
      margin-bottom: 1.5rem;
    }
    input[type=text], input[type=password] {
      width: 100%;
      padding: 0.9rem 1rem;
      font-family: 'DM Mono', monospace;
      font-size: 0.95rem;
      background: #f9fafb;
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus { border-color: #6366f1; }

    .meter-wrap { margin-bottom: 1.5rem; }
    .meter-label {
      display: flex;
      justify-content: space-between;
      font-size: 0.8rem;
      margin-bottom: 0.5rem;
      color: var(--muted);
    }
    #strengthLabel { font-weight: 700; font-size: 0.9rem; }
    .meter-bar {
      height: 8px;
      background: #f3f4f6;
      border-radius: 99px;
      overflow: hidden;
    }
    #meter {
      height: 100%;
      width: 0%;
      border-radius: 99px;
      background: #ef4444;
      transition: width 0.5s cubic-bezier(0.4,0,0.2,1), background 0.4s;
    }

    .checks {
      display: grid;
      gap: 0.4rem;
      margin-bottom: 1.5rem;
    }
    .check-item {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      font-size: 0.82rem;
      padding: 0.4rem 0;
      border-bottom: 1px solid #f3f4f6;
    }
    .check-item:last-child { border-bottom: none; }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: #e5e7eb; flex-shrink: 0; transition: background 0.3s; }
    .dot.pass { background: #10b981; }
    .dot.fail { background: #f3f4f6; }
    .check-item.pass { color: var(--text); }
    .check-item.fail { color: var(--muted); }

    .btn {
      width: 100%;
      padding: 0.9rem;
      background: var(--text);
      border: none;
      border-radius: 10px;
      color: #fff;
      font-family: 'Syne', sans-serif;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.85; }

    .nav-links {
      display: flex;
      gap: 0.6rem;
      flex-wrap: wrap;
      margin-top: 1.5rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--border);
    }
    .nav-links a {
      color: var(--muted);
      text-decoration: none;
      font-size: 0.78rem;
      padding: 0.3rem 0.7rem;
      border: 1px solid var(--border);
      border-radius: 6px;
      transition: all 0.2s;
    }
    .nav-links a:hover { color: #6366f1; border-color: #6366f1; }
  </style>
</head>
<body>
<div class="card">
  <div class="badge">branch: feature/password-strength-checker</div>
  <h1>Strength <span>Checker</span></h1>
  <p class="subtitle">Analyze your password's resilience in real time.</p>

  <div class="input-wrap">
    <input type="text" id="pwInput" placeholder="Type a password..." oninput="analyzeStrength()" />
  </div>

  <div class="meter-wrap">
    <div class="meter-label">
      <span>Strength</span>
      <span id="strengthLabel">—</span>
    </div>
    <div class="meter-bar"><div id="meter"></div></div>
  </div>

  <div class="checks" id="checks"></div>

  <div class="nav-links">
    <a href="/">← Generator</a>
    <a href="/mask">→ Mask Toggle</a>
    <a href="/validator">→ Validator</a>
  </div>
</div>

<script>
  let debounceTimer;
  function analyzeStrength() {
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(async () => {
      const pw = document.getElementById('pwInput').value;
      if (!pw) {
        document.getElementById('meter').style.width = '0%';
        document.getElementById('strengthLabel').textContent = '—';
        document.getElementById('checks').innerHTML = '';
        return;
      }
      const res = await fetch('/api/strength', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ password: pw })
      });
      const data = await res.json();

      const meter = document.getElementById('meter');
      meter.style.width = data.score + '%';
      meter.style.background = data.color;

      const label = document.getElementById('strengthLabel');
      label.textContent = data.label;
      label.style.color = data.color;

      const checksEl = document.getElementById('checks');
      checksEl.innerHTML = '';
      [...data.passed.map(m => ({msg: m, pass: true})),
       ...data.suggestions.map(m => ({msg: m, pass: false}))].forEach(({msg, pass}) => {
        checksEl.innerHTML += `
          <div class="check-item ${pass ? 'pass' : 'fail'}">
            <div class="dot ${pass ? 'pass' : 'fail'}"></div>
            <span>${msg}</span>
          </div>`;
      });
    }, 150);
  }
</script>
</body>
</html>
