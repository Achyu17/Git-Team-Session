<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Password Generator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Exo+2:wght@300;600;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0e1a;
      --surface: #111827;
      --border: #1e3a5f;
      --accent: #00d4ff;
      --accent2: #7c3aed;
      --text: #e2e8f0;
      --muted: #64748b;
      --success: #10b981;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Exo 2', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      background-image:
        radial-gradient(ellipse at 20% 50%, rgba(0,212,255,0.05) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 20%, rgba(124,58,237,0.06) 0%, transparent 50%);
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 2.5rem;
      width: 100%;
      max-width: 520px;
      box-shadow: 0 0 60px rgba(0,212,255,0.05), 0 20px 60px rgba(0,0,0,0.5);
    }
    .badge {
      display: inline-block;
      background: rgba(0,212,255,0.1);
      border: 1px solid rgba(0,212,255,0.3);
      color: var(--accent);
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      padding: 0.3rem 0.8rem;
      border-radius: 20px;
      margin-bottom: 1rem;
    }
    h1 {
      font-size: 2rem;
      font-weight: 800;
      line-height: 1.1;
      margin-bottom: 0.4rem;
    }
    h1 span { color: var(--accent); }
    .subtitle { color: var(--muted); font-size: 0.9rem; margin-bottom: 2rem; }

    .output-box {
      background: #070b14;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1rem 1.2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.8rem;
      min-height: 56px;
    }
    #output {
      font-family: 'Share Tech Mono', monospace;
      font-size: 1rem;
      color: var(--accent);
      word-break: break-all;
      flex: 1;
    }
    .copy-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 0.4rem 0.8rem;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.8rem;
      margin-left: 1rem;
      transition: all 0.2s;
      white-space: nowrap;
    }
    .copy-btn:hover { border-color: var(--accent); color: var(--accent); }

    .slider-group { margin-bottom: 1.5rem; }
    .slider-label {
      display: flex;
      justify-content: space-between;
      font-size: 0.85rem;
      color: var(--muted);
      margin-bottom: 0.5rem;
    }
    #lengthVal { color: var(--accent); font-weight: 600; }
    input[type=range] {
      width: 100%;
      accent-color: var(--accent);
      height: 4px;
      cursor: pointer;
    }

    .toggles {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.6rem;
      margin-bottom: 1.8rem;
    }
    .toggle-item {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      background: #070b14;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.6rem 0.8rem;
      cursor: pointer;
      transition: border-color 0.2s;
    }
    .toggle-item:hover { border-color: var(--accent); }
    .toggle-item input[type=checkbox] { accent-color: var(--accent); width: 15px; height: 15px; cursor: pointer; }
    .toggle-item label { font-size: 0.85rem; cursor: pointer; color: var(--text); }

    .generate-btn {
      width: 100%;
      padding: 0.9rem;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none;
      border-radius: 10px;
      color: #fff;
      font-family: 'Exo 2', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }
    .generate-btn:hover { opacity: 0.9; }
    .generate-btn:active { transform: scale(0.98); }

    .nav-links {
      display: flex;
      gap: 0.6rem;
      flex-wrap: wrap;
      margin-top: 1.5rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--border);
    }
    .nav-links a {
      color: var(--muted);
      text-decoration: none;
      font-size: 0.78rem;
      padding: 0.3rem 0.7rem;
      border: 1px solid var(--border);
      border-radius: 6px;
      transition: all 0.2s;
    }
    .nav-links a:hover { color: var(--accent); border-color: var(--accent); }
    .flash { animation: flashIn 0.4s ease; }
    @keyframes flashIn {
      from { opacity: 0; transform: translateY(-4px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
<div class="card">
  <div class="badge">⚡ Branch: feature/password-generator</div>
  <h1>Password <span>Generator</span></h1>
  <p class="subtitle">Generate cryptographically strong passwords instantly.</p>

  <div class="output-box">
    <span id="output">Click generate to begin...</span>
    <button class="copy-btn" onclick="copyPassword()">Copy</button>
  </div>

  <div class="slider-group">
    <div class="slider-label">
      <span>Password Length</span>
      <span id="lengthVal">16</span>
    </div>
    <input type="range" id="length" min="6" max="64" value="16"
      oninput="document.getElementById('lengthVal').textContent = this.value">
  </div>

  <div class="toggles">
    <div class="toggle-item">
      <input type="checkbox" id="uppercase" checked>
      <label for="uppercase">Uppercase (A–Z)</label>
    </div>
    <div class="toggle-item">
      <input type="checkbox" id="lowercase" checked>
      <label for="lowercase">Lowercase (a–z)</label>
    </div>
    <div class="toggle-item">
      <input type="checkbox" id="digits" checked>
      <label for="digits">Digits (0–9)</label>
    </div>
    <div class="toggle-item">
      <input type="checkbox" id="symbols" checked>
      <label for="symbols">Symbols (!@#…)</label>
    </div>
  </div>

  <button class="generate-btn" onclick="generatePassword()">⚡ Generate Password</button>

  <div class="nav-links">
    <a href="/strength">→ Strength Checker</a>
    <a href="/mask">→ Mask Toggle</a>
    <a href="/validator">→ Validator</a>
  </div>
</div>

<script>
  async function generatePassword() {
    const length = document.getElementById('length').value;
    const uppercase = document.getElementById('uppercase').checked;
    const lowercase = document.getElementById('lowercase').checked;
    const digits = document.getElementById('digits').checked;
    const symbols = document.getElementById('symbols').checked;

    const params = new URLSearchParams({ length, uppercase, lowercase, digits, symbols });
    const res = await fetch(`/api/generate?${params}`);
    const data = await res.json();

    const out = document.getElementById('output');
    out.textContent = data.password || data.error;
    out.className = 'flash';
    setTimeout(() => out.className = '', 500);
  }

  function copyPassword() {
    const text = document.getElementById('output').textContent;
    if (text && text !== 'Click generate to begin...') {
      navigator.clipboard.writeText(text);
      const btn = document.querySelector('.copy-btn');
      btn.textContent = '✓ Copied!';
      setTimeout(() => btn.textContent = 'Copy', 2000);
    }
  }
</script>
</body>
</html>
