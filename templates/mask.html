<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Password Mask / Unmask</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #18181b;
      --surface: #27272a;
      --border: #3f3f46;
      --accent: #f59e0b;
      --text: #fafafa;
      --muted: #71717a;
      --green: #4ade80;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Space Grotesk', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 2.5rem;
      width: 100%;
      max-width: 480px;
    }
    .badge {
      display: inline-block;
      background: rgba(245,158,11,0.1);
      border: 1px solid rgba(245,158,11,0.3);
      color: var(--accent);
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      padding: 0.3rem 0.8rem;
      border-radius: 20px;
      margin-bottom: 1.2rem;
    }
    h1 { font-size: 2rem; font-weight: 700; margin-bottom: 0.4rem; }
    h1 span { color: var(--accent); }
    .subtitle { color: var(--muted); font-size: 0.88rem; margin-bottom: 2rem; }

    .field {
      position: relative;
      margin-bottom: 1.2rem;
    }
    .field label {
      display: block;
      font-size: 0.78rem;
      color: var(--muted);
      font-weight: 500;
      margin-bottom: 0.4rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .pw-input-wrap {
      display: flex;
      align-items: center;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      transition: border-color 0.2s;
    }
    .pw-input-wrap:focus-within { border-color: var(--accent); }
    #pwInput {
      flex: 1;
      padding: 0.85rem 1rem;
      background: transparent;
      border: none;
      outline: none;
      font-family: 'Courier Prime', monospace;
      font-size: 1rem;
      color: var(--text);
    }
    .eye-btn {
      padding: 0 1rem;
      background: none;
      border: none;
      cursor: pointer;
      font-size: 1.2rem;
      color: var(--muted);
      transition: color 0.2s;
      height: 100%;
    }
    .eye-btn:hover { color: var(--accent); }

    .display-box {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1rem;
      margin-bottom: 1.5rem;
    }
    .display-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.4rem 0;
    }
    .display-row:not(:last-child) { border-bottom: 1px solid #3f3f46; }
    .display-key {
      font-size: 0.75rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }
    .display-val {
      font-family: 'Courier Prime', monospace;
      font-size: 0.9rem;
      color: var(--text);
      max-width: 260px;
      text-align: right;
      word-break: break-all;
    }
    #maskedVal { color: var(--muted); letter-spacing: 0.1em; }
    #lengthVal { color: var(--green); font-weight: 700; }

    .toggle-btn {
      width: 100%;
      padding: 0.9rem;
      background: var(--accent);
      color: var(--bg);
      border: none;
      border-radius: 10px;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s;
      margin-bottom: 0.8rem;
    }
    .toggle-btn:hover { opacity: 0.85; }

    .state-indicator {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      justify-content: center;
      font-size: 0.82rem;
      color: var(--muted);
      margin-bottom: 1.5rem;
    }
    .state-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--muted);
      transition: background 0.3s;
    }
    .state-dot.visible { background: var(--green); }

    .nav-links {
      display: flex;
      gap: 0.6rem;
      flex-wrap: wrap;
      padding-top: 1.5rem;
      border-top: 1px solid var(--border);
    }
    .nav-links a {
      color: var(--muted);
      text-decoration: none;
      font-size: 0.78rem;
      padding: 0.3rem 0.7rem;
      border: 1px solid var(--border);
      border-radius: 6px;
      transition: all 0.2s;
    }
    .nav-links a:hover { color: var(--accent); border-color: var(--accent); }
  </style>
</head>
<body>
<div class="card">
  <div class="badge">🔶 Branch: feature/password-mask-toggle</div>
  <h1>Mask / <span>Unmask</span></h1>
  <p class="subtitle">Toggle visibility of your password securely.</p>

  <div class="field">
    <label>Enter Password</label>
    <div class="pw-input-wrap">
      <input type="password" id="pwInput" placeholder="Enter your password..." oninput="updateDisplay()"/>
      <button class="eye-btn" id="eyeBtn" onclick="toggleVisibility()" title="Toggle visibility">👁</button>
    </div>
  </div>

  <div class="display-box">
    <div class="display-row">
      <span class="display-key">Masked</span>
      <span class="display-val" id="maskedVal">—</span>
    </div>
    <div class="display-row">
      <span class="display-key">Length</span>
      <span class="display-val" id="lengthVal">—</span>
    </div>
    <div class="display-row">
      <span class="display-key">Visible</span>
      <span class="display-val" id="visibleVal" style="color:#71717a;">—</span>
    </div>
  </div>

  <div class="state-indicator">
    <div class="state-dot" id="stateDot"></div>
    <span id="stateText">Password is hidden</span>
  </div>

  <button class="toggle-btn" onclick="toggleVisibility()">Toggle Visibility</button>

  <div class="nav-links">
    <a href="/">← Generator</a>
    <a href="/strength">← Strength</a>
    <a href="/validator">→ Validator</a>
  </div>
</div>

<script>
  let isVisible = false;
  const input = document.getElementById('pwInput');

  async function updateDisplay() {
    const pw = input.value;
    document.getElementById('visibleVal').textContent = isVisible ? (pw || '—') : '(hidden)';

    if (!pw) {
      document.getElementById('maskedVal').textContent = '—';
      document.getElementById('lengthVal').textContent = '—';
      return;
    }
    const res = await fetch('/api/mask', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ password: pw })
    });
    const data = await res.json();
    document.getElementById('maskedVal').textContent = data.masked;
    document.getElementById('lengthVal').textContent = data.length + ' characters';
  }

  function toggleVisibility() {
    isVisible = !isVisible;
    input.type = isVisible ? 'text' : 'password';
    document.getElementById('eyeBtn').textContent = isVisible ? '🙈' : '👁';
    document.getElementById('stateDot').className = 'state-dot' + (isVisible ? ' visible' : '');
    document.getElementById('stateText').textContent = isVisible ? 'Password is visible' : 'Password is hidden';
    const visVal = document.getElementById('visibleVal');
    visVal.textContent = isVisible ? (input.value || '—') : '(hidden)';
    visVal.style.color = isVisible ? '#fafafa' : '#71717a';
  }
</script>
</body>
</html>
